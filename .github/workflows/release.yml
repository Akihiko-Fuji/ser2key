name: Release Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install build dependencies
        run: python -m pip install -r requirements.txt nuitka ordered-set zstandard
      - name: Smoke-test application import
        run: python -c "import ser2key"
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Build one-file executable
        run: >-
          python -m nuitka
          --mode=onefile
          --assume-yes-for-downloads
          --windows-console-mode=disable
          --windows-icon-from-ico=f.ico
          --include-data-files=f.ico=f.ico
          --output-filename=ser2key.exe
          ser2key.py
      - name: Create release archive
        shell: pwsh
        run: Compress-Archive -Path ser2key.exe,config.ini -DestinationPath ser2key-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ser2key-windows-x64
          path: ser2key-windows-x64.zip
          if-no-files-found: error
      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag ser2key-windows-x64.zip --generate-notes --title $tag
          } else {
            gh release upload $tag ser2key-windows-x64.zip --clobber
          }
